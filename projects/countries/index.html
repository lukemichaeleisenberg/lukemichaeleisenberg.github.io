<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>countries — luke eisenberg</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="main.css" />
</head>
<body>

<header>
	<a href="/" class="site-name">luke eisenberg</a>
	<span class="breadcrumb-sep">/</span>
	<span class="page-title">countries</span>
</header>

<div class="shell">
	<!-- Sidebar -->
	<aside class="sidebar" data-cy="sidebar">
		<div class="sidebar-head">
			<h2>all countries</h2>
			<div class="search-wrap">
				<span class="search-icon">⌕</span>
				<input type="text" id="searchInput" data-cy="search-input" placeholder="search…" autocomplete="off" />
			</div>
		</div>
		<div class="country-list" id="countryList" data-cy="country-list">
			<div class="loading-spinner"><div class="spinner"></div> fetching…</div>
		</div>
		<div class="list-count" id="listCount" data-cy="list-count"></div>
	</aside>

	<!-- Detail -->
	<main class="detail" id="detailPanel" data-cy="detail-panel">
		<div class="detail-placeholder" data-cy="detail-placeholder">
			<span class="globe">🌍</span>
			<p>select a country to explore</p>
		</div>
	</main>
</div>

<!-- GraphQL inspector -->
<button class="gql-toggle" id="gqlToggle" data-cy="gql-toggle">{ } graphql</button>
<div class="gql-panel" id="gqlPanel" data-cy="gql-panel">
	<div class="gql-panel-head">
		<span>graphql inspector</span>
		<button class="gql-close" id="gqlClose" data-cy="gql-close">✕</button>
	</div>
	<div class="gql-tabs">
		<button class="gql-tab active" data-tab="query" data-cy="gql-tab">query</button>
		<button class="gql-tab" data-tab="response" data-cy="gql-tab">last response</button>
	</div>
	<div class="gql-body" id="gqlBody">
		<pre id="gqlContent" data-cy="gql-content"></pre>
	</div>
</div>

<script src="main.js"></script>
</body>
</html>
